<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="role-selection">
        <h3>Choose a Dashboard</h3>
        <div class="form-group role-group">
          <label>
            <input type="radio" name="role" value="student" checked /> Student
          </label>
          <label>
            <input type="radio" name="role" value="admin" /> Admin
          </label>
        </div>
        <div class="form-group" id="student-email-group">
          <label for="dashboard-email">Student Email:</label>
          <input
            type="email"
            id="dashboard-email"
            placeholder="your-email@mergington.edu"
          />
        </div>
        <button id="load-dashboard">Load Dashboard</button>
      </section>

      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="student-dashboard" class="hidden">
        <h3>Student Dashboard</h3>
        <div id="student-profile"></div>
      </section>

      <section id="admin-dashboard" class="hidden">
        <h3>Admin Dashboard</h3>
        <div id="admin-student-list">
          <!-- Admin student profiles will be shown here -->
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
